# Base
- type: deepMaintenanceEntity
  id: BaseEntity
  abstract: true
  radius: 0.28
  hitboxShape: Circle
  hitboxWidth: 0.60
  hitboxHeight: 2
  hitboxOffsetY: 0.20
  moveSpeed: 2.7
  moveAcceleration: 20
  moveFriction: 18
  maxHp: 10
  contactDamage: 1
  shooter: false
  shootCooldownSeconds: 0.8
  projectilePrototype: ProjectileEnemy
  canStrafe: false
  isBoss: false
  spriteLayer: 0
  spriteScale: 1.4
  spritePath: /Textures/_Orion/DeepMaintenance/Entity/grayscale.rsi
  spriteState: body

- type: deepMaintenanceEntity
  parent: BaseEntity
  id: BaseBoss
  moveSpeed: 2.3
  isBoss: true
  projectilePrototype: ProjectileBoss
  spriteScale: 1

- type: deepMaintenanceEntity
  parent: BaseEntity
  id: BaseChaser
  moveSpeed: 2

- type: deepMaintenanceEntity
  parent: BaseEntity
  id: BaseShooter
  moveSpeed: 2.1
  shooter: true
  canStrafe: true
  shootCooldownSeconds: 1.5

# Player entity
