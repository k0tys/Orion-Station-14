# Config
- type: deepMaintenanceTreasure
  id: TreasureConfig
  closedCrateSpritePath: /Textures/_Orion/DeepMaintenance/Crates/treasure.rsi
  closedCrateSpriteState: closed
  openCrateSpriteState: open
  lootTable: DeepMaintenanceTreasureLootTable
  openAnimationDuration: 0.32
  relicPickupGraceDuration: 0.25
  relicAppearDuration: 0.24
  relicAppearRise: 0.28
  enemySpawnChance: 0.1
  enemyPool:
  - entity: Gaper
    weight: 0.65
  - entity: Pooter
    weight: 0.35

# Base
- type: deepMaintenanceRelic
  id: BaseDeepMaintenanceRelic
  abstract: true
  basePrice: 15
  hudIconSpriteState: icon
  headAttachedSpriteScale: 1.4
  bodyAttachedSpriteScale: 1.4

- type: deepMaintenanceRelic
  id: BaseDeepMaintenanceFamiliar
  abstract: true
  basePrice: 18
  familiarConfigs:
  - behavior: Orbit
    count: 1
    followDistance: 1.15
    moveSpeed: 8
    shootInterval: 0.9
    projectileDamage: 3.5
    projectileSpeed: 6
    shootNearestEnemy: true

