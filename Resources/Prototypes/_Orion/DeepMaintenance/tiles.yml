- type: deepMaintenanceTile
  id: DeepMaintenanceTileBase
  abstract: true
  color: "#1A1A24"
  solid: false
  spriteLayer: 0

- type: deepMaintenanceTile
  parent: DeepMaintenanceTileBase
  id: DeepMaintenanceFloor
  spritePath: /Textures/Tiles/Planet/dirt.rsi
  spriteState: dirt

# Walls of the edge of the field
- type: deepMaintenanceTile
  parent: DeepMaintenanceTileBase
  id: DeepMaintenanceWall
  solid: true
  spritePath: /Textures/Structures/Walls/solid_rust.rsi
  spriteState: full

# Walls on the field
- type: deepMaintenanceTile
  parent: DeepMaintenanceTileBase
  id: DeepMaintenanceObstacle
  color: "#57576E"
  solid: true
  spritePath: /Textures/Structures/Walls/solid_rust.rsi
  spriteState: full
