- type: customGhost
  id: default
  category: color
  entity: MobObserver




- type: customGhost
  id: red
  entity: MobObserverRed
  category: color
  restrictions:
  - !type:PlaytimeServerRestriction
    hoursPlaytime: 1

- type: entity
  parent: MobObserver
  id: MobObserverRed
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Mobs/Ghosts/ghost_human.rsi
    color: "#f228"
    layers:
    - state: animated
      shader: unshaded



